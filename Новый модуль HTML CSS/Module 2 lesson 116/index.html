<!DOCTYPE html>
<html class="page" lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike. Just do it.</title>
    <link rel="shortcut icon" href="./SVG/Emblem__nike.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/base/index.css">
    <script defer src="./js/index.js" type="module"></script>

</head>

<body class="page__body">
    <header class="header">
        <div class="container container__header">
            <a class="header__logo link" href="#">
                <img src="./SVG/Emblem__header-website.svg" alt="Логотип Nike">
            </a>
            <nav class="menu header__nav" id="header__nav" aria-label="Главное меню">
                <ul class="nav__list">
                    <li class="nav__item"><a class="nav__link link" href="#" lang="en">Air Mag</a></li>
                    <li class="nav__item"><a class="nav__link link" href="#" lang="en">Размеры</a></li>
                    <li class="nav__item"><a class="nav__link link" href="#" lang="en">Характеристики</a></li>
                    <li class="nav__item"><a class="nav__link link" href="#" lang="en">Другие ТОП модели</a></li>
                </ul>
            </nav>
            <div class="header__controls">
                <a class=" header__order link" href="#">Сделать заказ</a>
                <div class="header__tools">
                    <button class="header__tools-button">
                        <svg width="24px" height="24px">
                            <use class="header__tools-icon" href="./SVG/sprite.svg#search">
                            </use>
                        </svg>
                    </button>
                    <button class="header__tools-button">
                        <svg width="24px" height="24px">
                            <use class="header__tools-icon" href="./SVG/sprite.svg#basket">
                            </use>
                        </svg>
                    </button>
                    <button class="header__burger burger" aria-label="Открыть меню" aria-expanded="false"
                        aria-controls="header__nav">
                        <svg width="24" height="24">
                            <use class="burger__icon-menu" href="./SVG/sprite.svg#menu-burger">
                            </use>
                            <use class="burger__icon-cross" href="./SVG/sprite.svg#menu-cross">
                            </use>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
